name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests scripts streamlit_app

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts streamlit_app

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q --cov=upliftbench --cov-report=term

      - name: No em dashes
        run: |
          if grep -rn $'\xe2\x80\x94' src tests scripts streamlit_app blog README.md CLAUDE.md 2>/dev/null; then
            echo "Em dashes found. Use commas, parens, or semicolons instead."
            exit 1
          fi
